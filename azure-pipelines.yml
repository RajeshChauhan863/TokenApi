# azure-pipelines.yml
trigger:
  - main   # Adjust to your default branch

pool:
  vmImage: 'windows-latest'   # Use Microsoft-hosted Windows agent

variables:
  buildConfiguration: 'Release'

steps:
  # Step 1: Install .NET Core SDK
  - task: UseDotNet@2
    inputs:
      packageType: 'sdk'
      version: '8.0.x'   # Adjust to your project's .NET Core version
      installationPath: $(Agent.ToolsDirectory)/dotnet

  # Step 2: Restore NuGet packages
  - script: dotnet restore
    displayName: 'Restore NuGet packages'

  # Step 3: Build the project
  - script: dotnet build --configuration $(buildConfiguration) --no-restore
    displayName: 'Build project'

  # Step 4: Run tests
  - script: dotnet test --configuration $(buildConfiguration) --no-build --verbosity normal
    displayName: 'Run unit tests'

  # Optional: Publish artifacts
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'bin/$(buildConfiguration)'
      ArtifactName: 'drop'
      publishLocation: 'Container'
